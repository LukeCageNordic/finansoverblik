  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);
    }
    html, body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; overscroll-behavior: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; background: #0f172a; }
    /* Dynamic Island / notch safe-area padding on the app root */
    #root { padding-top: env(safe-area-inset-top); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); min-height: 100vh; min-height: 100dvh; }
    /* Give bottom nav room for home-bar */
    nav.fixed.bottom-0, .fixed.bottom-0 { padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important; }
    /* Larger touch targets — minimum 44x44 per Apple HIG */
    button, a, [role="button"] { min-height: 44px; touch-action: manipulation; }
    button.h-8, button.h-9, button.h-10 { min-height: 44px; }
    /* Hide scrollbars */
    .overflow-x-auto::-webkit-scrollbar, .overflow-y-auto::-webkit-scrollbar { display: none; }
    .overflow-x-auto, .overflow-y-auto { -ms-overflow-style: none; scrollbar-width: none; }
    /* Disable pull-to-refresh rubber-band on main scroll */
    main { overscroll-behavior-y: contain; }

  const iconChoices = ["PiggyBank", "Plane", "Smartphone", "Car", "Home", "Heart", "Gift", "Trophy", "Target"];

    if (!newVault.name || !newVault.goal) return;
    const colors = ["#f97316", "#3b82f6", "#22c55e", "#8b5cf6", "#ec4899", "#eab308"];
    setVaults(prev => [...prev, {
      id: Date.now(),
      name: newVault.name,
      iconName: newVault.iconName,
      goal: Number(newVault.goal),
      current: 0,
      color: colors[prev.length % colors.length],
      deadline: "Løbende"
    }]);
    setNewVault({ name: "", goal: "", iconName: "PiggyBank" });
    setShowAddVault(false);
  };

  const topUpVault = (vaultId) => {
    const amount = Number(topUpAmount);
    if (!amount || amount <= 0) return;
    setVaults(prev => prev.map(v => v.id === vaultId ? { ...v, current: v.current + amount } : v));
    setAccounts(prev => prev.map(a => a.id === 1 ? { ...a, balance: a.balance - amount } : a));
    setTopUpAmount("");
    setShowTopUp(null);
  };

  const deleteVault = (id) => {
    const vault = vaults.find(v => v.id === id);
    if (vault) {
      setAccounts(prev => prev.map(a => a.id === 1 ? { ...a, balance: a.balance + vault.current } : a));

const InvestmentsPage = ({ investments }) => {
  const [filter, setFilter] = useState("Alle");
  const types = ["Alle", "Aktie", "ETF", "Crypto", "Råvare"];
  const filtered = filter === "Alle" ? investments : investments.filter(i => i.type === filter);

  const totalValue = investments.reduce((s, i) => s + toDKK(i.currentPrice * i.shares, i.currency), 0);
  const totalCost = investments.reduce((s, i) => s + toDKK(i.avgPrice * i.shares, i.currency), 0);
  const totalReturn = totalValue - totalCost;
  const totalReturnPct = (totalReturn / totalCost) * 100;

  const performanceData = [
    { m: "Nov", v: totalCost * 0.92 },
    { m: "Dec", v: totalCost * 0.95 },
    { m: "Jan", v: totalCost * 0.98 },
    { m: "Feb", v: totalCost * 1.02 },
    { m: "Mar", v: totalCost * 1.06 },
    { m: "Apr", v: totalValue },
  ];

  return (
    <div className="space-y-5">
      <h2 className="text-2xl font-bold text-gray-900">Investeringer</h2>

      <div className="bg-gradient-to-br from-purple-600 to-indigo-700 rounded-3xl p-6 text-white shadow-xl">
        <p className="text-purple-200 text-sm mb-1">Porteføljeværdi</p>
        <h2 className="text-3xl font-bold mb-2">{formatDKK(totalValue)}</h2>
        <span className={`text-sm px-3 py-1 rounded-lg ${totalReturn >= 0 ? 'bg-green-500/20 text-green-200' : 'bg-red-500/20 text-red-200'}`}>
          {totalReturn >= 0 ? "↑" : "↓"} {formatDKK(Math.abs(totalReturn))} ({formatPercent(totalReturnPct)})
        </span>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h3 className="font-semibold text-gray-900 mb-4">Udvikling</h3>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={performanceData}>
            <defs>
              <linearGradient id="colorP" x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor="#8b5cf6" stopOpacity={0.3}/>
                <stop offset="95%" stopColor="#8b5cf6" stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0" />
            <XAxis dataKey="m" tick={{ fontSize: 12 }} stroke="#9ca3af" />
            <YAxis tick={{ fontSize: 11 }} stroke="#9ca3af" tickFormatter={v => `${(v/1000).toFixed(0)}k`} />
            <Tooltip formatter={(value) => formatDKK(value)} />
            <Area type="monotone" dataKey="v" stroke="#8b5cf6" fill="url(#colorP)" strokeWidth={2} />
          </AreaChart>
        </ResponsiveContainer>
      </div>

      <div className="flex gap-2 overflow-x-auto pb-1">
        {types.map(type => (
          <button key={type} onClick={() => setFilter(type)}
            className={`px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap ${filter === type ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-600'}`}>
            {type}
          </button>
        ))}
      </div>

      <div className="space-y-2">
        {filtered.map((inv, i) => {
          const value = toDKK(inv.currentPrice * inv.shares, inv.currency);
          const cost = toDKK(inv.avgPrice * inv.shares, inv.currency);
          const gain = value - cost;
          const gainPct = (gain / cost) * 100;
          return (
            <div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${
                  inv.type === "Aktie" ? "bg-blue-50" : inv.type === "ETF" ? "bg-purple-50" :
                  inv.type === "Crypto" ? "bg-orange-50" : "bg-yellow-50"}`}>
                  {inv.type === "Aktie" ? <BarChart3 size={18} className="text-blue-500" /> :
                   inv.type === "ETF" ? <PieChart size={18} className="text-purple-500" /> :
                   inv.type === "Crypto" ? <Coins size={18} className="text-orange-500" /> :
                   <Globe size={18} className="text-yellow-500" />}
                </div>
                <div>
                  <p className="text-sm font-semibold text-gray-900">{inv.name}</p>
                  <p className="text-xs text-gray-500">{inv.shares} enheder</p>
                </div>
              </div>
              <div className="text-right">
                <p className="text-sm font-bold text-gray-900">{formatDKK(value)}</p>
                <p className={`text-xs font-medium ${gain >= 0 ? 'text-green-600' : 'text-red-600'}`}>{formatPercent(gainPct)}</p>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

          className="w-full bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-xl bg-purple-50 flex items-center justify-center">
              <QrCode size={20} className="text-purple-600" />
            </div>
            <div className="text-left">
              <p className="font-semibold text-gray-900 text-sm">Setup ny authenticator</p>
              <p className="text-xs text-gray-500">Vis QR-kode til scanning</p>
            </div>
          </div>
          <ChevronRight size={18} className="text-gray-400" />
        </button>

        {showQR && (
          <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 text-center">
            <div className="inline-block bg-gray-100 rounded-2xl p-6 mb-3">
              <div className="w-40 h-40 bg-white p-3 rounded-xl">
                <div className="w-full h-full grid grid-cols-10 gap-0.5">
                  {Array.from({length: 100}).map((_, i) => (
                    <div key={i} className={`${(i * 7 + 3) % 3 === 0 ? 'bg-gray-900' : 'bg-white'} rounded-sm`} />
                  ))}
                </div>
              </div>
            </div>
            <p className="text-sm text-gray-700 mb-2">Scan med Google Authenticator, Yubico Authenticator eller Apple Passwords</p>
            <div className="bg-gray-50 rounded-xl p-3 text-xs font-mono text-gray-600 flex items-center justify-between">
              <span className="truncate">JBSW Y3DP EHPK 3PXP</span>
              <Copy size={14} className="text-gray-400 flex-shrink-0" />
            </div>
          </div>
        )}

        <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <h3 className="font-semibold text-gray-900 mb-3 text-sm">Sikkerhedsaktivitet</h3>
          <div className="space-y-3 text-sm">
            <div className="flex items-center gap-3">
              <Check size={16} className="text-green-500 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-gray-800">Login fra MacBook Pro M2</p>
                <p className="text-xs text-gray-400">I dag, 14:32</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <Check size={16} className="text-green-500 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-gray-800">Login fra iPhone 15 Pro</p>
                <p className="text-xs text-gray-400">I går, 19:15</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <Check size={16} className="text-green-500 flex-shrink-0" />
              <div className="flex-1">
                <p className="text-gray-800">2FA aktiveret: Apple Passkey</p>
                <p className="text-xs text-gray-400">2 dage siden</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="space-y-5">
      <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center gap-4">
        <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg">
          {MOCK_USER.avatar}
        </div>
        <div className="flex-1 min-w-0">
          <h2 className="text-lg font-bold text-gray-900">{MOCK_USER.name}</h2>
          <p className="text-xs text-gray-500 truncate">{MOCK_USER.email}</p>
          <p className="text-xs text-gray-400 mt-0.5">Medlem siden {MOCK_USER.memberSince}</p>
        </div>
      </div>

      <div className="bg-gradient-to-br from-pink-500 to-rose-600 rounded-2xl p-5 text-white">
        <div className="flex items-center gap-2 mb-1">
          <Landmark size={18} />
          <p className="text-pink-100 text-sm font-medium">Pension</p>
        </div>
        <h3 className="text-2xl font-bold">{formatDKK(totalPension)}</h3>
        <p className="text-pink-100 text-xs mt-1">Gennemsnitligt afkast 6,7%</p>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <h3 className="font-semibold text-gray-900 mb-3">Pensionskonti</h3>
        <div className="space-y-3">
          {pension.map((p, i) => (
            <div key={i} className="flex justify-between items-center pb-3 border-b border-gray-50 last:border-0 last:pb-0">
              <div>
                <p className="font-medium text-gray-800 text-sm">{p.name}</p>
                <p className="text-xs text-gray-400">Mdl. {formatDKK(p.monthlyContribution)} · +{p.returnRate}%</p>
              </div>
              <p className="font-bold text-gray-900">{formatDKK(p.value)}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <MenuRow icon={Shield} title="Sikkerhed" sub="2FA, YubiKey, Passkeys" onClick={() => setShowSecurity(true)} />
        <MenuRow icon={Settings} title="Indstillinger" sub="Notifikationer, sprog, valuta" />
        <MenuRow icon={Upload} title="Importer data" sub="CSV/JSON fra Spiir" />
        <MenuRow icon={Bell} title="Notifikationer" sub="Alerts & advarsler" />
        <MenuRow icon={LogOut} title="Log ud" sub="" onClick={onLogout} danger />
      </div>

      <p className="text-center text-xs text-gray-400">FinansOverblik v1.0 · iPhone 15 Pro & MacBook Pro</p>
    </div>
  );
};

// ==================== MAIN APP ====================

  const [isAuthenticated, setIsAuthenticated] = useState(false);
  const [activePage, setActivePage] = useState("home");
  const [accounts, setAccounts] = useState(MOCK_ACCOUNTS);
  const [vaults, setVaults] = useState(MOCK_VAULTS);
  const [transactions] = useState(MOCK_TRANSACTIONS);
  const [investments, setInvestments] = useState(MOCK_INVESTMENTS);
  const [pension] = useState(MOCK_PENSION);

  if (!isAuthenticated) {
    return <LoginScreen onLogin={() => setIsAuthenticated(true)} />;
  }

  return (
    <div className="min-h-screen bg-gray-50" style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', system-ui, sans-serif" }}>
      <header className="sticky top-0 bg-white/80 backdrop-blur-lg border-b border-gray-100 z-30 px-5 py-3">
        <div className="max-w-lg mx-auto flex items-center justify-between">
          <div className="flex items-center gap-2">
            <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center">
              <DollarSign size={18} className="text-white" />
            </div>
            <h1 className="text-base font-bold text-gray-900">FinansOverblik</h1>
            <ShieldCheck size={14} className="text-green-500" />
          </div>
          <button onClick={() => {
            setInvestments(prev => prev.map(inv => ({...inv, currentPrice: inv.currentPrice * (1 + (Math.random() - 0.48) * 0.03)})));
          }} className="p-2 rounded-xl bg-gray-100">
            <RefreshCw size={16} className="text-gray-600" />
          </button>
        </div>
      </header>

      <main className="max-w-lg mx-auto px-5 py-5 pb-28">
        {activePage === "home" && <HomePage accounts={accounts} vaults={vaults} transactions={transactions} investments={investments} pension={pension} setActivePage={setActivePage} />}
        {activePage === "accounts" && <AccountsPage accounts={accounts} setAccounts={setAccounts} vaults={vaults} setVaults={setVaults} transactions={transactions} />}
        {activePage === "invest" && <InvestmentsPage investments={investments} />}
        {activePage === "ai" && <AIAgentPage />}
        {activePage === "profile" && <ProfilePage pension={pension} onLogout={() => setIsAuthenticated(false)} />}
      </main>

      <Nav active={activePage} setActive={setActivePage} />
    </div>
  );
}

// mount
const root = createRoot(document.getElementById("root"));
root.render(<FinansDashboard />);
document.getElementById("loading")?.remove();
</script>

</body></html>
